<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // OVERRIDE_MATRIX</title>
    <style>
        :root {
            --bg-color: #030704;
            --terminal-green: #00ff66;
            --terminal-dark-green: #002208;
            --text-color: #adffd0;
            --error-red: #ff2a2a;
            --border-style: 1px solid var(--terminal-green);
            --glow: 0 0 12px rgba(0, 255, 102, 0.25);
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #08160c 0%, #030704 100%);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Scanline Overlay Screen Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin-top: 15px;
            background: rgba(0, 5, 2, 0.93);
            border: var(--border-style);
            padding: 20px;
            box-shadow: var(--glow);
            border-radius: 2px;
        }

        .hidden { display: none !important; }

        /* Hacker Login Screen */
        .login-box {
            max-width: 450px;
            margin: 60px auto;
            padding: 25px;
            border: var(--border-style);
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,255,102,0.1);
        }

        .terminal-header {
            color: var(--terminal-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 5px var(--terminal-green);
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: #020503;
            border: var(--border-style);
            color: var(--terminal-green);
            font-size: 1rem;
            text-align: center;
        }

        input:focus { outline: none; box-shadow: 0 0 15px rgba(0,255,102,0.4); }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--terminal-dark-green);
            color: var(--terminal-green);
            border: var(--border-style);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.15s, color 0.15s;
        }

        button:hover {
            background-color: var(--terminal-green);
            color: #000;
            box-shadow: 0 0 15px var(--terminal-green);
        }

        /* Control Banner */
        .banner {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: stretch;
            gap: 15px;
            border-bottom: var(--border-style);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 768px) {
            .banner { flex-direction: row; align-items: center; }
        }

        .actions-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .actions-group button { width: auto; padding: 10px 18px; font-size: 0.85rem;}

        .kill-btn { background-color: #200; color: var(--error-red); border-color: var(--error-red); }
        .kill-btn:hover { background-color: var(--error-red); color: #000; box-shadow: 0 0 10px var(--error-red); }

        .purge-btn { background-color: #310; color: #ff9900; border-color: #ff9900; }
        .purge-btn:hover { background-color: #ff9900; color: #000; box-shadow: 0 0 10px #ff9900; }

        /* Hacker Cards Grid Layout */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) { .data-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .data-grid { grid-template-columns: repeat(3, 1fr); } }

        .data-card {
            background: #000;
            border: var(--border-style);
            padding: 18px;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 10px rgba(0,255,102,0.03);
        }

        .card-id {
            font-size: 0.75rem;
            color: #5ab37d;
            border-bottom: 1px dashed rgba(0, 255, 102, 0.3);
            padding-bottom: 6px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .data-body { margin-bottom: 15px; }

        .data-row {
            margin: 8px 0;
            font-size: 0.9rem;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .data-key { color: var(--terminal-green); font-weight: bold; text-transform: uppercase; margin-right: 5px; }

        /* Card Single Delete Button Component */
        .single-del-btn {
            background: rgba(30, 0, 0, 0.6);
            color: var(--error-red);
            border: 1px solid var(--error-red);
            font-size: 0.75rem;
            padding: 6px 12px;
            width: 100%;
            text-align: center;
            margin-top: auto;
        }
        .single-del-btn:hover {
            background: var(--error-red);
            color: #000;
            box-shadow: 0 0 12px var(--error-red);
        }

        /* Glitchy Matrix Loading Elements */
        .loading-console {
            color: var(--terminal-green);
            font-size: 1rem;
            grid-column: 1 / -1;
            padding: 40px 0;
            text-align: center;
        }

        .spinner {
            display: inline-block;
            margin-bottom: 15px;
            animation: rot 0.8s linear infinite;
        }
        @keyframes rot { 100% { transform: rotate(360deg); } }

        .error-msg { 
            color: var(--error-red); 
            margin: 10px 0; 
            text-transform: uppercase;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .blink { animation: b 0.8s steps(2, start) infinite; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="login-box">
            <div class="terminal-header">// SECURITY_OVERRIDE_GATE_</div>
            <div id="login-error" class="error-msg hidden">!! KEY DECRYPTION FAILURE !!</div>
            <input type="password" id="admin-pass" placeholder="[ENTER SYSTEM PASSKEY]" required>
            <button id="login-btn">EXECUTE ACCESS >></button>
        </div>

        <div id="dashboard-screen" class="hidden">
            <div class="banner">
                <div class="terminal-header">SYS_LOGS // COGNITIVE_INJECTION<span class="blink">_</span></div>
                <div class="actions-group">
                    <button id="purge-btn" class="purge-btn">PURGE_ENTIRE_DB</button>
                    <button id="logout-btn" class="kill-btn">DISCONNECT</button>
                </div>
            </div>

            <div id="db-error" class="error-msg hidden"></div>

            <div id="data-grid-output" class="data-grid">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_8BED9BePH6zcGDjk1oxyDgG6wlzLBTc",
            authDomain: "instagram-clone-66462.firebaseapp.com",
            projectId: "instagram-clone-66462",
            storageBucket: "instagram-clone-66462.firebasestorage.app",
            messagingSenderId: "850910386904",
            appId: "1:850910386904:web:8dbfeeebde81585e7b15ad"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const SECRET_PASSKEY = "Admin$Panel";
        const TARGET_COLLECTION = "credentials"; 

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const dataGridOutput = document.getElementById('data-grid-output');
        const loginError = document.getElementById('login-error');
        const dbError = document.getElementById('db-error');
        const passInput = document.getElementById('admin-pass');

        if (sessionStorage.getItem('auth_session') === 'true') {
            showDashboard();
        }

        document.getElementById('login-btn').addEventListener('click', () => {
            if (passInput.value === SECRET_PASSKEY) {
                loginError.classList.add('hidden');
                sessionStorage.setItem('auth_session', 'true');
                showDashboard();
            } else {
                loginError.classList.remove('hidden');
                passInput.value = '';
            }
        });

        passInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });

        function showDashboard() {
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            streamAllData();
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('auth_session');
            location.reload();
        });

        // Global Action: Wipe out entire dataset
        document.getElementById('purge-btn').addEventListener('click', async () => {
            const confirmation = confirm("CRITICAL CORE DESTRUCTION: Execute wipeout routine on ALL documents?");
            if (!confirmation) return;

            showHackerLoading("[DELETING ENTIRE DB BUFFER...]");
            dbError.classList.add('hidden');

            try {
                const querySnapshot = await getDocs(collection(db, TARGET_COLLECTION));
                if (querySnapshot.empty) {
                    alert("Routine empty. Collection has no sectors mapped.");
                    streamAllData();
                    return;
                }

                const deletionPromises = [];
                querySnapshot.forEach((documentRef) => {
                    deletionPromises.push(deleteDoc(doc(db, TARGET_COLLECTION, documentRef.id)));
                });

                await Promise.all(deletionPromises);
                alert("OVERRIDE SUCCESSFUL: Entire payload wiped.");
                streamAllData();
            } catch (error) {
                dbError.textContent = "!! ERASURE CORE FAILURE: " + error.message.toUpperCase() + " !!";
                dbError.classList.remove('hidden');
                streamAllData();
            }
        });

        // Hacker Loading Display Helper Function
        function showHackerLoading(message = "[ESTABLISHING MATRIX LINK...]") {
            dataGridOutput.innerHTML = `
                <div class="loading-console">
                    <div class="spinner">[ / ]</div>
                    <div>${message}</div>
                </div>
            `;
        }

        // Feature: Target specific single document for deletion
        window.deleteIndividualDoc = async function(documentId) {
            const targetVerification = confirm(`ISOLATE TARGET ID: ${documentId}?\nExecute deletion?`);
            if (!targetVerification) return;

            dbError.classList.add('hidden');
            showHackerLoading(`[DESTROYING DOC SECTOR: ${documentId}]`);

            try {
                const targetedDocRef = doc(db, TARGET_COLLECTION, documentId);
                await deleteDoc(targetedDocRef);
                streamAllData(); // Live update view layout immediately
            } catch (error) {
                console.error(error);
                dbError.textContent = "!! DELETION INJECT BLOCKED: " + error.message.toUpperCase() + " !!";
                dbError.classList.remove('hidden');
                streamAllData();
            }
        };

        // Render Stream Grid Module
        async function streamAllData() {
            dbError.classList.add('hidden');
            showHackerLoading("[INTERCEPTING FIRESTORE PAYLOADS...]");

            try {
                const querySnapshot = await getDocs(collection(db, TARGET_COLLECTION));

                if (querySnapshot.empty) {
                    dataGridOutput.innerHTML = `<div style="color: #ffcc00; grid-column: 1/-1;">// SYSTEM ALERT: ZERO DATA NODES DETECTED IN COLLECTION "${TARGET_COLLECTION}"</div>`;
                    return;
                }

                dataGridOutput.innerHTML = '';

                querySnapshot.forEach((doc) => {
                    const documentData = doc.data();
                    
                    let cardContent = `<div class="data-card">`;
                    cardContent += `<div class="data-body">`;
                    cardContent += `<div class="card-id">NODE_UID: ${doc.id}</div>`;
                    
                    for (const [key, value] of Object.entries(documentData)) {
                        let displayValue = value;
                        if (typeof value === 'object' && value !== null) {
                            displayValue = JSON.stringify(value);
                        }
                        
                        cardContent += `
                            <div class="data-row">
                                <span class="data-key">${key}::</span><span>${displayValue}</span>
                            </div>
                        `;
                    }
                    
                    cardContent += `</div>`; // Close data-body
                    
                    // Appended unique tactical deletion trigger mapped to doc ID
                    cardContent += `
                        <button class="single-del-btn" onclick="deleteIndividualDoc('${doc.id}')">
                            [X] PUSH_PURGE
                        </button>
                    `;
                    cardContent += `</div>`; // Close data-card
                    
                    dataGridOutput.innerHTML += cardContent;
                });

            } catch (error) {
                console.error(error);
                dbError.textContent = "!! KERNEL REJECTION EXCEPTION: " + error.message.toUpperCase() + " !!";
                dbError.classList.remove('hidden');
                dataGridOutput.innerHTML = `<div style="color: var(--error-red); grid-column: 1/-1;">CRITICAL TERMINAL INTERRUPT. FIX SECURITY CONFIGS.</div>`;
            }
        }
    </script>
</body>
</html>
